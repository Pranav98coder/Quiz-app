<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css"></link>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="timer">0</span>s</div>
        </div>

        <div id="quiz-container" class="quiz-container" style="display: block;">
            <h2 id="question"></h2>
            <div id="options" class="options"></div>
                
        </div>

        <div class="navigation" id="navigation" style="display: flex;">
            
        </div>

        <div id="result-container" class="result-container" style="display: none;">
            <h2>Quiz Completed!</h2>
            <div class="final-score">
                <p>Your Final Score: <span id="final-score">0</span></p>
                <p>Total Questions: <span id="total-questions">6</span></p>
                <p>Correct Answers: <span id="correct-answers">0</span></p>
                <p>
                    Incorrect Answers: <span id="incorrect-answers">6</span>
                </p>
            </div>
            <button id="restart-button" class="restart-button">
                Restart Quiz
            </button>
        </div>

        <div id="alert" class="alert error" style="display: none;">Time's up!</div>
    </div>
    
    <script src="script.js"></script>   
</body>

</html>
